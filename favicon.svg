<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-labelledby="favicon-title">
  <title id="favicon-title">iTools Logo</title>
  <defs>
    <!-- Base blue-to-purple gradient -->
    <linearGradient id="base-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#007AFF"/>
      <stop offset="100%" stop-color="#5856D6"/>
    </linearGradient>

    <!-- Bottom shadow gradient for depth -->
    <linearGradient id="shadow-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#000" stop-opacity="0"/>
      <stop offset="70%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.3"/>
    </linearGradient>

    <!-- Top specular highlight — liquid glass gloss -->
    <linearGradient id="gloss-grad" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.55"/>
      <stop offset="35%" stop-color="#fff" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#fff" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>

    <!-- Radial specular spot — top-left light source -->
    <radialGradient id="specular-spot" cx="0.3" cy="0.2" r="0.7" fx="0.3" fy="0.15">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.4"/>
      <stop offset="40%" stop-color="#fff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>

    <!-- Inner edge bright border gradient -->
    <linearGradient id="edge-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#fff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0.25"/>
    </linearGradient>

    <!-- Clip for the rounded square -->
    <clipPath id="icon-clip">
      <rect x="2" y="2" width="96" height="96" rx="22"/>
    </clipPath>
  </defs>

  <!-- Layer 1: Base fill — blue to purple gradient -->
  <rect x="2" y="2" width="96" height="96" rx="22" fill="url(#base-grad)"/>

  <!-- Layer 2: Bottom edge shadow for depth -->
  <rect x="2" y="2" width="96" height="96" rx="22" fill="url(#shadow-grad)" clip-path="url(#icon-clip)"/>

  <!-- Layer 3: Specular radial highlight — top-left light source -->
  <rect x="2" y="2" width="96" height="96" rx="22" fill="url(#specular-spot)" clip-path="url(#icon-clip)"/>

  <!-- Layer 4: Linear gloss overlay — top-down shine -->
  <rect x="2" y="2" width="96" height="96" rx="22" fill="url(#gloss-grad)" clip-path="url(#icon-clip)"/>

  <!-- Layer 5: "iT" text — white, bold, centered -->
  <text
    x="50"
    y="66"
    text-anchor="middle"
    font-family="system-ui,-apple-system,'Helvetica Neue',sans-serif"
    font-size="52"
    font-weight="700"
    letter-spacing="-1"
    fill="#fff"
    fill-opacity="0.95"
  >iT</text>

  <!-- Layer 6: Thin bright inner border — glass edge effect -->
  <rect x="2" y="2" width="96" height="96" rx="22" fill="none" stroke="url(#edge-grad)" stroke-width="1.2"/>
</svg>
